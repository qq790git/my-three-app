<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js 材质完全入门指南</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050510; overflow: hidden; font-family: 'PingFang SC', 'Microsoft YaHei', monospace; }
        canvas { display: block; }

        /* ── 顶部标题栏 ─────────────────────────────────── */
        #header {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 10px 16px;
            background: rgba(0,0,0,0.78);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            gap: 14px;
            z-index: 10;
            flex-wrap: wrap;
        }
        #header h1 {
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            white-space: nowrap;
        }

        /* ── 材质切换标签 ──────────────────────────────── */
        .tab-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.55);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tab-btn:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }
        .tab-btn.active {
            background: #6366f1;
            border-color: #6366f1;
            color: #fff;
            font-weight: 700;
        }

        /* ── 左侧说明面板 ──────────────────────────────── */
        #info-panel {
            position: absolute;
            top: 52px;
            left: 10px;
            width: 260px;
            background: rgba(0,0,0,0.72);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 14px 16px;
            color: #bbb;
            font-size: 12px;
            line-height: 1.75;
            z-index: 10;
            max-height: calc(100vh - 70px);
            overflow-y: auto;
        }
        #info-panel::-webkit-scrollbar { width: 4px; }
        #info-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

        #info-panel .panel-title {
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.12);
        }
        #info-panel .panel-subtitle {
            color: #a5b4fc;
            font-size: 11px;
            font-weight: 600;
            margin: 10px 0 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #info-panel .desc {
            color: #ccc;
            font-size: 12px;
            line-height: 1.75;
            margin-bottom: 6px;
        }
        #info-panel .code-block {
            background: rgba(99,102,241,0.12);
            border: 1px solid rgba(99,102,241,0.25);
            border-radius: 6px;
            padding: 8px 10px;
            font-family: Consolas, 'Courier New', monospace;
            font-size: 11px;
            color: #93c5fd;
            line-height: 1.6;
            margin: 8px 0;
            white-space: pre;
            overflow-x: auto;
        }
        #info-panel .tag {
            display: inline-block;
            padding: 1px 7px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
            margin-right: 4px;
            margin-bottom: 2px;
        }
        .tag-perf-fast { background: rgba(34,197,94,0.2); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
        .tag-perf-medium { background: rgba(251,191,36,0.2); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
        .tag-perf-slow { background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
        .tag-light { background: rgba(147,197,253,0.15); color: #7dd3fc; border: 1px solid rgba(147,197,253,0.2); }
        .tag-no-light { background: rgba(148,163,184,0.15); color: #94a3b8; border: 1px solid rgba(148,163,184,0.2); }

        #info-panel .param-row {
            display: flex;
            align-items: baseline;
            gap: 6px;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        #info-panel .param-row:last-child { border-bottom: none; }
        #info-panel .param-name {
            font-family: Consolas, monospace;
            font-size: 11px;
            color: #86efac;
            flex-shrink: 0;
            min-width: 90px;
        }
        #info-panel .param-desc {
            font-size: 11px;
            color: #94a3b8;
        }

        /* ── 右下角操作提示 ─────────────────────────────── */
        #controls-hint {
            position: absolute;
            bottom: 14px;
            right: 14px;
            color: rgba(255,255,255,0.3);
            font-size: 11px;
            line-height: 1.9;
            text-align: right;
            z-index: 10;
            pointer-events: none;
        }

        /* ── 性能排序条（底部中央）────────────────────────── */
        #perf-bar {
            position: absolute;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 0;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 5px 14px;
            z-index: 10;
            pointer-events: none;
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            gap: 6px;
        }
        #perf-bar .perf-label { color: rgba(255,255,255,0.3); font-size: 10px; }
        #perf-bar .perf-item {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.3s;
        }
        #perf-bar .perf-item.highlight {
            background: #6366f1;
            color: #fff;
        }
        #perf-bar .perf-arrow { color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <!-- 顶部标题 + 材质切换 -->
    <div id="header">
        <h1>✨ Three.js 材质入门指南</h1>
        <div class="tab-group">
            <button class="tab-btn active" data-mat="basic">Basic</button>
            <button class="tab-btn" data-mat="lambert">Lambert</button>
            <button class="tab-btn" data-mat="phong">Phong</button>
            <button class="tab-btn" data-mat="toon">Toon</button>
            <button class="tab-btn" data-mat="standard">Standard</button>
            <button class="tab-btn" data-mat="physical">Physical</button>
            <button class="tab-btn" data-mat="special">特殊材质</button>
        </div>
    </div>

    <!-- 左侧说明面板 -->
    <div id="info-panel">
        <div class="panel-title" id="panel-title">MeshBasicMaterial</div>
        <div id="panel-body"></div>
    </div>

    <!-- 性能排序条 -->
    <div id="perf-bar">
        <span class="perf-label">性能：</span>
        <span class="perf-item" id="pb-basic">Basic</span>
        <span class="perf-arrow">→</span>
        <span class="perf-item" id="pb-lambert">Lambert</span>
        <span class="perf-arrow">→</span>
        <span class="perf-item" id="pb-phong">Phong</span>
        <span class="perf-arrow">→</span>
        <span class="perf-item" id="pb-standard">Standard</span>
        <span class="perf-arrow">→</span>
        <span class="perf-item" id="pb-physical">Physical</span>
        <span class="perf-label" style="margin-left:4px">最慢</span>
    </div>

    <!-- 右下角操作提示 -->
    <div id="controls-hint">
        拖拽旋转 · 滚轮缩放 · 右键平移<br>
        GUI 面板可实时调整参数
    </div>

    <script src="./index.js" type="module"></script>
</body>
</html>
